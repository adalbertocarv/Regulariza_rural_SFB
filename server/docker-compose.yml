version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio_local
    ports:
      - "9000:9000" # Porta da API (S3)
      - "9001:9001" # Porta do Painel de Controle (Web UI)
    environment:
      - MINIO_ROOT_USER=minioadmin      # Seu AWS_ACCESS_KEY_ID local
      - MINIO_ROOT_PASSWORD=minioadmin  # Seu AWS_SECRET_ACCESS_KEY local
    volumes:
      - ./minio-data:/data # Persiste os arquivos localmente na pasta do projeto
    command: server /data --console-address ":9001"